<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphQL</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Login Page -->
    <div id="login-page">
        <div id="login-card">
            <h1>Login</h1>
            <p>Enter your credentials</p>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="identifier">Username or Email</label>
                    <input type="text" id="identifier" name="identifier" placeholder="Username/Email">
                    <span class="field error" id="identifier-error"></span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password">
                    <span class="field error" id="password-error"></span>
                </div>
                <div class="form-group">
                    <span class="field error" id="form-error"></span>
                    <button type="submit" id="login-button">Login</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content">
    <div class="top-bar">
        <span class="top-bar-title">CJ Stats</span>
        <a href="#" id="logout-link">Logout</a>
    </div>
    <div class="dashboard-grid">
    <div id="user-info" class="card"></div>
    <div id="level-card" class="card"></div>
    <div id="streak-card" class="card"></div>
    <div id="activity-card" class="card"></div>
    <div id="xp-projects-card" class="card"></div>
    <div id="graphs-section"></div>
</div>
</main>
    <script src="app.js"></script>
</body>

</html>
